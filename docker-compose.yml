services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_CONFIG_FILE: /app/config/local.yaml
      APP_PORT: "8080"
    volumes:
      - ./config/local.yaml:/app/config/local.yaml:ro
      - ./secrets:/app/secrets:ro
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    ports:
      - "3000:80"
